<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manta Dive Log</title>
<style>
  :root {
    --accent: #007380;
    --accent-35: rgba(0, 115, 128, 0.35);
    --bg: #e5f6ff;
    --card-bg: #ffffff;
    --gray5: #e5e5ea;
    --label: #000000;
    --secondary-label: rgba(60, 60, 67, 0.6);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--label);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── Tab-Bar (Menü) ─────────────────────────────────────── */

  .site-logo {
    display: flex;
    justify-content: center;
    padding-top: 24px;
  }

  .site-logo img {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    display: block;
    animation: manta-glow 9.7s infinite;
  }

  @keyframes manta-glow {
    0% {
      box-shadow:
        0 0 20px rgba(48, 176, 199, 0.9),
        0 0 50px rgba(48, 176, 199, 0.5),
        0 0 100px rgba(48, 176, 199, 0.2);
      animation-timing-function: ease-in-out;
    }
    31% {
      box-shadow:
        0 0 2px rgba(48, 176, 199, 0.9),
        0 0 5px rgba(48, 176, 199, 0.5),
        0 0 10px rgba(48, 176, 199, 0.2);
      animation-timing-function: linear;
    }
    38% {
      box-shadow:
        0 0 2px rgba(48, 176, 199, 0.9),
        0 0 5px rgba(48, 176, 199, 0.5),
        0 0 10px rgba(48, 176, 199, 0.2);
      animation-timing-function: ease-out;
    }
    100% {
      box-shadow:
        0 0 20px rgba(48, 176, 199, 0.9),
        0 0 50px rgba(48, 176, 199, 0.5),
        0 0 100px rgba(48, 176, 199, 0.2);
    }
  }

  .tabbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    max-width: 960px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Vorbereitet auf den Wegfall des Beta-Buttons nach der Beta-Phase:
     Sind nur noch 3 Tabs vorhanden, füllt der erste (Home) bei
     schmalem Screen allein die erste Zeile, die übrigen zwei teilen
     sich Zeile zwei. Bei 4 Tabs bleibt die Regel wirkungslos. */
  .tab:first-child:nth-last-child(3) {
    grid-column: 1 / -1;
  }

  @media (min-width: 640px) {
    .tabbar {
      display: flex;
      flex-wrap: nowrap;
    }
    .tab {
      flex: 1 1 0;
    }
  }

  .tab {
    text-align: center;
    text-decoration: none;
    font-weight: 700;
    font-size: clamp(11px, 3.2vw, 14px);
    padding: 8px 6px;
    border-radius: 8px;
    background: var(--gray5);
    color: var(--label);
    border: 1px solid var(--accent-35);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    line-height: 1.2;
  }

  .tab-active {
    background: var(--accent);
    color: #ffffff;
    border-color: transparent;
  }

  /* ── Layout: Sections links, Screenshot rechts (Desktop) ──── */

  .hero-grid {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 64px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 32px;
  }

  .sections-col {
    order: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .screenshot-col {
    order: 2;
    display: flex;
    justify-content: center;
  }

  @media (min-width: 768px) {
    .hero-grid {
      grid-template-columns: 1fr 1fr;
      align-items: center;
    }
    .sections-col { order: 1; }
    .screenshot-col { order: 2; }
  }

  /* ── Section: Header + Eintrag (Stil aus HilfeView) ───────── */

  .entry-header {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--secondary-label);
    margin: 0 0 8px 4px;
  }

  .entry-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--label);
    font-size: 17px;
    font-weight: 500;
  }

  .entry-card .icon {
    color: var(--accent);
    flex-shrink: 0;
    display: flex;
  }

  /* ── Screenshot-Platzhalter ────────────────────────────────
     Kein simuliertes Apple-Gerät -- neutraler Platzhalter bis
     der echte HomeView-Screenshot vorliegt (dann offizielle
     Apple-Bezel-Vorlage verwenden, siehe Chat). */

  .phone-frame {
    width: 260px;
  }

  .phone-frame img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 36px;
    border: 2px solid rgba(0, 0, 0, 0.15);
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
  }

  .phone-placeholder {
    aspect-ratio: 9 / 19.5;
    width: 260px;
    border-radius: 36px;
    border: 2px solid rgba(0, 0, 0, 0.15);
    background: #f2f2f2;
    box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0, 0, 0, 0.4);
    font-size: 13px;
    text-align: center;
    padding: 16px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

  <div class="site-logo">
    <img src="/assets/app-icon.png" alt="Manta Dive Log" width="64" height="64">
  </div>

  <nav class="tabbar" aria-label="Hauptnavigation">
    <a href="/" class="tab tab-active" aria-current="page">Home</a>
    <a href="/beta" class="tab">Beta</a>
    <a href="/hilfe" class="tab">App&#8209;Hilfe</a>
    <a href="/datenschutz" class="tab">Datenschutz&nbsp;+&nbsp;Impressum</a>
  </nav>

  <main class="hero-grid">

    <div class="sections-col">

      <section>
        <h2 class="entry-header">Beta-Version</h2>
        <a class="entry-card" href="/beta">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v12"/>
              <path d="M7 10l5 5 5-5"/>
              <path d="M4 19h16"/>
            </svg>
          </span>
          <span>Zur Installationsanleitung</span>
        </a>
      </section>

      <section>
        <h2 class="entry-header">Support</h2>
        <!-- TODO: Platzhalter-Adresse durch die eingerichtete Gmail-Adresse ersetzen -->
        <a class="entry-card" href="mailto:DEINE-ADRESSE@gmail.com">
          <span class="icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
          </span>
          <span>E-Mail an den Support</span>
        </a>
      </section>

    </div>

    <div class="screenshot-col">
      <!-- TODO: durch echten HomeView-Screenshot ersetzen -->
      <div class="phone-frame">
        <div class="phone-placeholder">HomeView-Screenshot folgt</div>
      </div>
    </div>

  </main>

</body>
</html>
